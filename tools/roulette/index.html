<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>룰렛 – Handshake Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3350; --accent: #6c63ff; --accent2: #ff6584; --text: #e8eaf6; --text-muted: #7986cb; --radius: 16px; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
    .back { align-self: flex-start; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; margin-bottom: 24px; }
    .back:hover { color: var(--accent); }
    h1 { font-size: 1.8rem; margin-bottom: 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .container { width: 100%; max-width: 480px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }

    .roulette-wrap { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 24px; }
    canvas { display: block; }
    .pointer { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 28px solid var(--accent2); filter: drop-shadow(0 2px 6px rgba(255,101,132,0.5)); z-index: 2; }

    .result { font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--accent); min-height: 2em; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }

    .btn { display: block; margin: 0 auto 16px; padding: 14px 36px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .items-section { margin-top: 16px; }
    .items-section label { font-size: 0.9rem; color: var(--text-muted); display: block; margin-bottom: 8px; }
    .item-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 36px; }
    .item-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .item-tag .remove { cursor: pointer; color: var(--accent2); font-weight: 700; }
    .item-tag .remove:hover { opacity: 0.7; }
    .add-row { display: flex; gap: 8px; }
    .add-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 0.95rem; outline: none; }
    .add-row input:focus { border-color: var(--accent); }
    .btn-add { padding: 10px 18px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-add:hover { opacity: 0.85; }

    .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .preset-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <a class="back" href="../../public/index.html">← 돌아가기</a>
  <h1>🎡 룰렛</h1>

  <div class="container">
    <div class="card">
      <div class="roulette-wrap">
        <div class="pointer"></div>
        <canvas id="wheel" width="340" height="340"></canvas>
      </div>
      <div class="result" id="result"></div>
      <button class="btn" id="btn-spin">돌리기</button>
    </div>

    <div class="card items-section">
      <label>항목 편집</label>
      <div class="presets">
        <button class="preset-btn" data-items="예,아니오">예/아니오</button>
        <button class="preset-btn" data-items="1,2,3,4,5,6">1~6</button>
        <button class="preset-btn" data-items="짜장면,짬뽕,볶음밥,탕수육,마라탕">점심 메뉴</button>
        <button class="preset-btn" data-items="빨강,주황,노랑,초록,파랑,남색,보라">무지개</button>
      </div>
      <div class="item-list" id="item-list"></div>
      <div class="add-row">
        <input type="text" id="new-item" placeholder="새 항목 입력..." />
        <button class="btn-add" id="btn-add">추가</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const SIZE = canvas.width;
    const CENTER = SIZE / 2;
    const RADIUS = CENTER - 10;
    const resultEl = document.getElementById('result');
    const btnSpin = document.getElementById('btn-spin');
    const itemListEl = document.getElementById('item-list');
    const newItemInput = document.getElementById('new-item');
    const STORAGE_KEY = 'hs_roulette_items';

    const COLORS = [
      '#6c63ff', '#ff6584', '#43e97b', '#f7971e', '#00c9ff',
      '#e040fb', '#ff5252', '#64ffda', '#fdd835', '#7c4dff',
      '#ff7043', '#26c6da', '#ab47bc', '#66bb6a', '#ef5350',
      '#42a5f5'
    ];

    let items = [];
    let rotation = 0;
    let spinning = false;
    let animId = null;

    function loadItems() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { items = JSON.parse(saved); } catch { items = []; }
      }
      if (items.length === 0) {
        items = ['피자', '치킨', '햄버거', '초밥', '파스타', '떡볶이'];
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function renderItemTags() {
      itemListEl.innerHTML = '';
      items.forEach((item, i) => {
        const tag = document.createElement('span');
        tag.className = 'item-tag';
        tag.innerHTML = `<span style="color:${COLORS[i % COLORS.length]}">●</span> ${escapeHtml(item)} <span class="remove" data-index="${i}">✕</span>`;
        itemListEl.appendChild(tag);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function drawWheel(rot) {
      ctx.clearRect(0, 0, SIZE, SIZE);
      if (items.length === 0) return;

      const sliceAngle = (Math.PI * 2) / items.length;

      for (let i = 0; i < items.length; i++) {
        const startAngle = rot + i * sliceAngle;
        const endAngle = startAngle + sliceAngle;

        // Slice
        ctx.beginPath();
        ctx.moveTo(CENTER, CENTER);
        ctx.arc(CENTER, CENTER, RADIUS, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();

        // Border
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(CENTER, CENTER);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.min(14, 160 / items.length)}px sans-serif`;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        const label = items[i].length > 8 ? items[i].slice(0, 7) + '…' : items[i];
        ctx.fillText(label, RADIUS - 14, 5);
        ctx.restore();
      }

      // Center circle
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, 18, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1d27';
      ctx.fill();
      ctx.strokeStyle = '#2e3350';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function getWinnerIndex(rot) {
      if (items.length === 0) return -1;
      const sliceAngle = (Math.PI * 2) / items.length;
      // Pointer is at top (3π/2 or -π/2)
      const pointerAngle = -Math.PI / 2;
      let normalizedAngle = (pointerAngle - rot) % (Math.PI * 2);
      if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
      return Math.floor(normalizedAngle / sliceAngle) % items.length;
    }

    function spin() {
      if (spinning || items.length < 2) return;
      spinning = true;
      btnSpin.disabled = true;
      resultEl.textContent = '';

      const totalRotation = Math.PI * 2 * (5 + Math.random() * 5) + Math.random() * Math.PI * 2;
      const duration = 4000 + Math.random() * 1000;
      const startTime = performance.now();
      const startRotation = rotation;

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeOutCubic(progress);

        rotation = startRotation + totalRotation * eased;
        drawWheel(rotation);

        if (progress < 1) {
          animId = requestAnimationFrame(animate);
        } else {
          spinning = false;
          btnSpin.disabled = false;
          const winnerIdx = getWinnerIndex(rotation);
          if (winnerIdx >= 0) {
            resultEl.textContent = '🎉 ' + items[winnerIdx];
            resultEl.style.color = COLORS[winnerIdx % COLORS.length];
          }
        }
      }

      animId = requestAnimationFrame(animate);
    }

    // Events
    btnSpin.addEventListener('click', spin);

    document.getElementById('btn-add').addEventListener('click', addItem);
    newItemInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function addItem() {
      const val = newItemInput.value.trim();
      if (!val) return;
      items.push(val);
      newItemInput.value = '';
      saveItems();
      renderItemTags();
      drawWheel(rotation);
    }

    itemListEl.addEventListener('click', e => {
      if (e.target.classList.contains('remove')) {
        const idx = parseInt(e.target.dataset.index);
        items.splice(idx, 1);
        saveItems();
        renderItemTags();
        drawWheel(rotation);
        resultEl.textContent = '';
      }
    });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        items = btn.dataset.items.split(',');
        saveItems();
        renderItemTags();
        drawWheel(rotation);
        resultEl.textContent = '';
      });
    });

    // Init
    loadItems();
    renderItemTags();
    drawWheel(rotation);
  })();
  </script>
</body>
</html>
