<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff | Handshake Tools</title>
<link rel="stylesheet" href="../../public/common.css" />
<style>
  .container { width: 100%; max-width: 1000px; }
  .editor-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 640px) { .editor-row { grid-template-columns: 1fr; } }
  .editor-col label {
    display: block; font-size: 0.9rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 8px;
  }
  .editor-col textarea {
    width: 100%; height: 260px; resize: vertical;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    color: var(--text); font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.9rem; line-height: 1.6; outline: none;
  }
  .editor-col textarea:focus { border-color: var(--accent); }
  .actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stats-bar {
    display: flex; gap: 20px; font-size: 0.85rem; margin-bottom: 16px; flex-wrap: wrap;
  }
  .stat { padding: 6px 14px; border-radius: 8px; font-weight: 600; }
  .stat-add { background: rgba(102,187,106,0.15); color: #66bb6a; }
  .stat-del { background: rgba(239,83,80,0.15); color: #ef5350; }
  .stat-same { background: rgba(121,134,203,0.15); color: #7986cb; }
  .diff-output {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0;
    box-shadow: var(--shadow); overflow: auto; max-height: 500px;
    font-family: 'Consolas', 'Courier New', monospace; font-size: 0.85rem;
  }
  .diff-line {
    display: flex; padding: 2px 16px; line-height: 1.7;
    border-bottom: 1px solid var(--border);
    white-space: pre-wrap; word-break: break-all;
  }
  .diff-line .ln {
    min-width: 40px; text-align: right; color: var(--text-muted);
    user-select: none; padding-right: 12px; flex-shrink: 0;
    font-size: 0.8rem;
  }
  .diff-line .sign {
    min-width: 20px; flex-shrink: 0; font-weight: 700; user-select: none;
  }
  .diff-line .content { flex: 1; }
  .diff-add { background: rgba(102,187,106,0.1); }
  .diff-add .sign { color: #66bb6a; }
  .diff-add .content { color: #66bb6a; }
  .diff-del { background: rgba(239,83,80,0.1); }
  .diff-del .sign { color: #ef5350; }
  .diff-del .content { color: #ef5350; }
  .diff-same .content { color: var(--text-muted); }
  .empty-state {
    padding: 40px; text-align: center; color: var(--text-muted); font-size: 0.95rem;
  }
</style>
</head>
<body class="page-wrap">
<a class="back" href="../../public/index.html">&larr; 돌아가기</a>
<h1 class="page-title">Text Diff / Compare</h1>

<div class="container">
  <div class="editor-row">
    <div class="editor-col">
      <label for="textA">Original</label>
      <textarea id="textA" placeholder="Paste original text here..."></textarea>
    </div>
    <div class="editor-col">
      <label for="textB">Modified</label>
      <textarea id="textB" placeholder="Paste modified text here..."></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="compare()">Compare</button>
    <button class="btn btn-ghost" onclick="swap()">Swap</button>
    <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
  </div>

  <div class="stats-bar" id="stats" style="display:none">
    <span class="stat stat-add" id="statAdd">+ 0 added</span>
    <span class="stat stat-del" id="statDel">- 0 removed</span>
    <span class="stat stat-same" id="statSame">0 unchanged</span>
  </div>

  <div class="diff-output" id="diffOutput">
    <div class="empty-state">Enter text in both fields and click Compare</div>
  </div>
</div>

<script>
// LCS-based diff
function lcs(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);

  // backtrack
  const result = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) {
      result.unshift({ type: 'same', line: a[i-1] });
      i--; j--;
    } else if (dp[i-1][j] >= dp[i][j-1]) {
      result.unshift({ type: 'del', line: a[i-1] });
      i--;
    } else {
      result.unshift({ type: 'add', line: b[j-1] });
      j--;
    }
  }
  while (i > 0) { result.unshift({ type: 'del', line: a[--i] }); }
  while (j > 0) { result.unshift({ type: 'add', line: b[--j] }); }
  return result;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function compare() {
  const a = document.getElementById('textA').value.split('\n');
  const b = document.getElementById('textB').value.split('\n');
  const diff = lcs(a, b);

  let html = '';
  let lnA = 0, lnB = 0;
  let added = 0, deleted = 0, same = 0;

  diff.forEach(d => {
    let cls, sign, ln;
    if (d.type === 'same') {
      lnA++; lnB++;
      cls = 'diff-same'; sign = ' '; ln = lnA; same++;
    } else if (d.type === 'add') {
      lnB++;
      cls = 'diff-add'; sign = '+'; ln = ''; added++;
    } else {
      lnA++;
      cls = 'diff-del'; sign = '-'; ln = lnA; deleted++;
    }
    html += `<div class="diff-line ${cls}">
      <span class="ln">${ln}</span>
      <span class="sign">${sign}</span>
      <span class="content">${escapeHtml(d.line)}</span>
    </div>`;
  });

  if (!html) html = '<div class="empty-state">Both texts are empty</div>';

  document.getElementById('diffOutput').innerHTML = html;
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('statAdd').textContent = `+ ${added} added`;
  document.getElementById('statDel').textContent = `- ${deleted} removed`;
  document.getElementById('statSame').textContent = `${same} unchanged`;
}

function swap() {
  const a = document.getElementById('textA');
  const b = document.getElementById('textB');
  [a.value, b.value] = [b.value, a.value];
}

function clearAll() {
  document.getElementById('textA').value = '';
  document.getElementById('textB').value = '';
  document.getElementById('diffOutput').innerHTML = '<div class="empty-state">Enter text in both fields and click Compare</div>';
  document.getElementById('stats').style.display = 'none';
}
</script>
<script src="../../public/theme.js"></script>
</body>
</html>
