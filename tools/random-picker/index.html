<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랜덤 뽑기 – Handshake Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3350; --accent: #6c63ff; --accent2: #ff6584; --text: #e8eaf6; --text-muted: #7986cb; --radius: 16px; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
    .back { align-self: flex-start; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; margin-bottom: 24px; }
    .back:hover { color: var(--accent); }
    h1 { font-size: 1.8rem; margin-bottom: 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 8px 18px; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .panel { display: none; width: 100%; max-width: 480px; }
    .panel.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }

    /* Dice */
    .dice-result { font-size: 4rem; text-align: center; margin: 20px 0; }
    .dice-options { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .dice-opt { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; }
    .dice-opt.active { border-color: var(--accent); color: var(--accent); }
    .dice-count { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .dice-count input { width: 50px; text-align: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px; }
    .dice-history { color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 8px; }

    /* Number */
    .num-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .num-row label { min-width: 40px; font-size: 0.9rem; }
    .num-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-size: 1rem; }
    .num-result { font-size: 3rem; font-weight: 700; text-align: center; color: var(--accent); margin: 16px 0; }

    /* List */
    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 12px; font-size: 0.95rem; line-height: 1.6; resize: vertical; min-height: 120px; outline: none; font-family: inherit; }
    textarea:focus { border-color: var(--accent); }
    .pick-result { font-size: 1.8rem; font-weight: 700; text-align: center; color: var(--accent2); margin: 16px 0; min-height: 2em; }

    .btn { display: block; margin: 0 auto; padding: 14px 36px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.85; }

    /* Coin */
    .coin { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #fdd835, #f9a825); display: flex; align-items: center; justify-content: center; margin: 24px auto; font-size: 2.4rem; font-weight: 800; color: #333; transition: transform 0.6s; }
    .coin.flip { animation: coinFlip 0.6s ease-out; }
    @keyframes coinFlip { 0% { transform: rotateY(0); } 50% { transform: rotateY(1800deg); } 100% { transform: rotateY(3600deg); } }
  </style>
</head>
<body>
  <a class="back" href="../../public/index.html">← 돌아가기</a>
  <h1>🎲 랜덤 뽑기</h1>

  <div class="tabs">
    <button class="tab active" data-panel="dice">주사위</button>
    <button class="tab" data-panel="number">숫자</button>
    <button class="tab" data-panel="list">목록</button>
    <button class="tab" data-panel="coin">동전</button>
  </div>

  <!-- Dice -->
  <div class="panel active" id="panel-dice">
    <div class="card">
      <div class="dice-options" id="dice-opts"></div>
      <div class="dice-count"><span>개수:</span><input type="number" id="dice-count" value="1" min="1" max="20" /></div>
      <div class="dice-result" id="dice-result">🎲</div>
      <div class="dice-history" id="dice-history"></div>
      <button class="btn" id="btn-roll">굴리기</button>
    </div>
  </div>

  <!-- Number -->
  <div class="panel" id="panel-number">
    <div class="card">
      <div class="num-row"><label>최소</label><input type="number" id="num-min" value="1" /></div>
      <div class="num-row"><label>최대</label><input type="number" id="num-max" value="100" /></div>
      <div class="num-result" id="num-result">?</div>
      <button class="btn" id="btn-num">생성</button>
    </div>
  </div>

  <!-- List -->
  <div class="panel" id="panel-list">
    <div class="card">
      <textarea id="list-input" placeholder="항목을 줄바꿈으로 구분하여 입력...">사과
바나나
딸기
포도
수박</textarea>
      <div class="pick-result" id="pick-result"></div>
      <button class="btn" id="btn-pick">뽑기</button>
    </div>
  </div>

  <!-- Coin -->
  <div class="panel" id="panel-coin">
    <div class="card">
      <div class="coin" id="coin">?</div>
      <button class="btn" id="btn-coin">던지기</button>
    </div>
  </div>

  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });

    // Dice
    const diceTypes = [4, 6, 8, 10, 12, 20, 100];
    let diceType = 6;
    const diceOpts = document.getElementById('dice-opts');
    diceTypes.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'dice-opt' + (d === 6 ? ' active' : '');
      btn.textContent = 'D' + d;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.dice-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        diceType = d;
      });
      diceOpts.appendChild(btn);
    });

    let diceHistory = [];
    document.getElementById('btn-roll').addEventListener('click', () => {
      const count = parseInt(document.getElementById('dice-count').value) || 1;
      const results = [];
      for (let i = 0; i < Math.min(count, 20); i++) {
        results.push(Math.floor(Math.random() * diceType) + 1);
      }
      document.getElementById('dice-result').textContent = results.join(', ');
      const total = results.reduce((a, b) => a + b, 0);
      diceHistory.unshift(`${count}D${diceType}: ${results.join('+')} = ${total}`);
      if (diceHistory.length > 5) diceHistory.pop();
      document.getElementById('dice-history').innerHTML = diceHistory.join('<br>');
    });

    // Number
    document.getElementById('btn-num').addEventListener('click', () => {
      const min = parseInt(document.getElementById('num-min').value) || 0;
      const max = parseInt(document.getElementById('num-max').value) || 100;
      const result = Math.floor(Math.random() * (max - min + 1)) + min;
      document.getElementById('num-result').textContent = result;
    });

    // List
    document.getElementById('btn-pick').addEventListener('click', () => {
      const items = document.getElementById('list-input').value.split('\n').map(s => s.trim()).filter(Boolean);
      if (items.length === 0) return;
      const pick = items[Math.floor(Math.random() * items.length)];
      document.getElementById('pick-result').textContent = pick;
    });

    // Coin
    document.getElementById('btn-coin').addEventListener('click', () => {
      const coin = document.getElementById('coin');
      coin.classList.remove('flip');
      void coin.offsetWidth;
      coin.classList.add('flip');
      setTimeout(() => {
        coin.textContent = Math.random() < 0.5 ? '앞' : '뒤';
      }, 300);
    });
  </script>
</body>
</html>
