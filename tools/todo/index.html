<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 목록 – Handshake Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3350; --accent: #6c63ff; --accent2: #ff6584; --text: #e8eaf6; --text-muted: #7986cb; --radius: 16px; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
    .back { align-self: flex-start; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; margin-bottom: 24px; }
    .back:hover { color: var(--accent); }
    h1 { font-size: 1.8rem; margin-bottom: 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .add-row { display: flex; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 24px; }
    .add-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 12px 16px; font-size: 1rem; outline: none; }
    .add-row input:focus { border-color: var(--accent); }
    .add-row button { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 12px 20px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 6px 16px; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .stats { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }
    .todo-list { width: 100%; max-width: 500px; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; transition: opacity 0.2s; }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done .todo-text { text-decoration: line-through; }
    .todo-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 14px; }
    .todo-item.done .todo-check { border-color: var(--accent); background: var(--accent); color: #fff; }
    .todo-text { flex: 1; font-size: 0.95rem; }
    .todo-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 4px; }
    .todo-del:hover { color: var(--accent2); }
    .clear-btn { margin-top: 16px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); padding: 8px 16px; font-size: 0.85rem; cursor: pointer; }
    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>
  <a class="back" href="../../public/index.html">← 돌아가기</a>
  <h1>✅ 할 일 목록</h1>

  <div class="add-row">
    <input id="inp" type="text" placeholder="새 할 일 입력..." />
    <button id="btn-add">추가</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="active">미완료</button>
    <button class="filter-btn" data-filter="done">완료</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="todo-list" id="list"></div>
  <button class="clear-btn" id="btn-clear">완료 항목 삭제</button>

  <script>
    const KEY = 'hs_todo_items';
    let todos = JSON.parse(localStorage.getItem(KEY) || '[]');
    let filter = 'all';

    function save() { localStorage.setItem(KEY, JSON.stringify(todos)); }

    function render() {
      const list = document.getElementById('list');
      const stats = document.getElementById('stats');
      const done = todos.filter(t => t.done).length;
      stats.textContent = `${todos.length}개 중 ${done}개 완료`;
      list.innerHTML = '';

      const filtered = todos.filter(t => filter === 'all' || (filter === 'done' ? t.done : !t.done));
      filtered.forEach((t, idx) => {
        const realIdx = todos.indexOf(t);
        const div = document.createElement('div');
        div.className = 'todo-item' + (t.done ? ' done' : '');
        div.innerHTML = `
          <button class="todo-check" data-i="${realIdx}">${t.done ? '✓' : ''}</button>
          <span class="todo-text">${esc(t.text)}</span>
          <button class="todo-del" data-i="${realIdx}">✕</button>
        `;
        list.appendChild(div);
      });
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function add() {
      const inp = document.getElementById('inp');
      const text = inp.value.trim();
      if (!text) return;
      todos.unshift({ text, done: false, created: Date.now() });
      inp.value = '';
      save(); render();
    }

    document.getElementById('btn-add').addEventListener('click', add);
    document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

    document.getElementById('list').addEventListener('click', e => {
      const i = parseInt(e.target.dataset.i);
      if (isNaN(i)) return;
      if (e.target.classList.contains('todo-check')) { todos[i].done = !todos[i].done; }
      else if (e.target.classList.contains('todo-del')) { todos.splice(i, 1); }
      save(); render();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save(); render();
    });

    render();
  </script>
</body>
</html>
