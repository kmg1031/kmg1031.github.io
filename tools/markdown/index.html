<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown Preview</title>
<link rel="stylesheet" href="../../public/common.css" />
<style>
  .container { width: 100%; max-width: 1100px; flex: 1; display: flex; flex-direction: column; }
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .panel-labels { display: flex; gap: 16px; }
  .panel-label { font-weight: 700; font-size: 0.9rem; color: var(--text-muted); }
  .split {
    display: flex; gap: 12px; flex: 1; min-height: 0;
  }
  .editor-pane, .preview-pane {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
  }
  #editor {
    flex: 1; resize: none; padding: 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.9rem; line-height: 1.6; outline: none;
    min-height: 400px;
  }
  #editor:focus { border-color: var(--accent); }
  #preview {
    flex: 1; padding: 16px 20px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow-y: auto; font-size: 0.95rem; line-height: 1.7;
    min-height: 400px;
  }
  /* Markdown preview styles */
  #preview h1 { font-size: 1.6rem; font-weight: 800; margin: 16px 0 8px; border-bottom: 2px solid var(--border); padding-bottom: 6px; }
  #preview h2 { font-size: 1.3rem; font-weight: 700; margin: 14px 0 6px; }
  #preview h3 { font-size: 1.1rem; font-weight: 700; margin: 12px 0 6px; }
  #preview h4 { font-size: 1rem; font-weight: 700; margin: 10px 0 4px; }
  #preview h5 { font-size: 0.9rem; font-weight: 700; margin: 8px 0 4px; }
  #preview h6 { font-size: 0.85rem; font-weight: 700; margin: 8px 0 4px; color: var(--text-muted); }
  #preview p { margin: 8px 0; }
  #preview strong { font-weight: 700; }
  #preview em { font-style: italic; }
  #preview a { color: var(--accent); text-decoration: underline; }
  #preview code {
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
    font-family: 'Consolas', monospace; font-size: 0.85em;
  }
  #preview pre {
    background: var(--surface2); padding: 14px; border-radius: 10px;
    overflow-x: auto; margin: 10px 0; border: 1px solid var(--border);
  }
  #preview pre code { background: none; padding: 0; }
  #preview blockquote {
    border-left: 4px solid var(--accent); padding: 8px 16px;
    margin: 10px 0; color: var(--text-muted); background: var(--surface2);
    border-radius: 0 8px 8px 0;
  }
  #preview ul, #preview ol { padding-left: 24px; margin: 8px 0; }
  #preview li { margin: 4px 0; }
  #preview hr { border: none; border-top: 2px solid var(--border); margin: 16px 0; }
  .copy-html-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 16px; color: var(--text-muted);
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  .copy-html-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-html-btn.copied { border-color: #4caf50; color: #4caf50; }
  @media (max-width: 700px) {
    .split { flex-direction: column; }
    #editor, #preview { min-height: 250px; }
  }
</style>
</head>
<body class="page-wrap">
<a class="back" href="../../public/index.html">&larr; 돌아가기</a>
<h1 class="page-title">Markdown Preview</h1>

<div class="container">
  <div class="toolbar">
    <div class="panel-labels">
      <span class="panel-label">Editor</span>
      <span class="panel-label" style="margin-left:auto">Preview</span>
    </div>
    <button class="copy-html-btn" id="copyHtmlBtn">Copy HTML</button>
  </div>
  <div class="split">
    <div class="editor-pane">
      <textarea id="editor" spellcheck="false"># Hello Markdown!

This is a **bold** and *italic* example.

## Features

- Unordered list item 1
- Unordered list item 2
- Nested content

1. Ordered item
2. Another item

> This is a blockquote

`inline code` and a code block:

```
function hello() {
  console.log("Hello!");
}
```

[Link example](https://example.com)

---

Have fun writing!</textarea>
    </div>
    <div class="preview-pane">
      <div id="preview"></div>
    </div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const copyHtmlBtn = document.getElementById('copyHtmlBtn');

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseMarkdown(md) {
  let html = '';
  const lines = md.split('\n');
  let i = 0;
  let inCodeBlock = false;
  let codeContent = '';

  while (i < lines.length) {
    const line = lines[i];

    // Code block
    if (line.trimStart().startsWith('```')) {
      if (inCodeBlock) {
        html += '<pre><code>' + esc(codeContent.replace(/\n$/, '')) + '</code></pre>\n';
        codeContent = '';
        inCodeBlock = false;
        i++; continue;
      } else {
        inCodeBlock = true;
        i++; continue;
      }
    }
    if (inCodeBlock) {
      codeContent += line + '\n';
      i++; continue;
    }

    // Blank line
    if (line.trim() === '') {
      i++; continue;
    }

    // Horizontal rule
    if (/^(-{3,}|_{3,}|\*{3,})\s*$/.test(line.trim())) {
      html += '<hr>\n';
      i++; continue;
    }

    // Headers
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      const level = hMatch[1].length;
      html += `<h${level}>${inline(hMatch[2])}</h${level}>\n`;
      i++; continue;
    }

    // Blockquote
    if (line.trimStart().startsWith('> ')) {
      let bqLines = [];
      while (i < lines.length && lines[i].trimStart().startsWith('> ')) {
        bqLines.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      html += '<blockquote>' + bqLines.map(l => '<p>' + inline(l) + '</p>').join('') + '</blockquote>\n';
      continue;
    }

    // Unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      html += '<ul>\n';
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        html += '<li>' + inline(lines[i].replace(/^\s*[-*+]\s+/, '')) + '</li>\n';
        i++;
      }
      html += '</ul>\n';
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      html += '<ol>\n';
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        html += '<li>' + inline(lines[i].replace(/^\s*\d+\.\s+/, '')) + '</li>\n';
        i++;
      }
      html += '</ol>\n';
      continue;
    }

    // Paragraph
    let pLines = [line];
    i++;
    while (i < lines.length && lines[i].trim() !== '' &&
           !/^#{1,6}\s/.test(lines[i]) && !/^\s*[-*+]\s+/.test(lines[i]) &&
           !/^\s*\d+\.\s+/.test(lines[i]) && !lines[i].trimStart().startsWith('> ') &&
           !lines[i].trimStart().startsWith('```') &&
           !/^(-{3,}|_{3,}|\*{3,})\s*$/.test(lines[i].trim())) {
      pLines.push(lines[i]);
      i++;
    }
    html += '<p>' + pLines.map(l => inline(l)).join('<br>') + '</p>\n';
  }

  // Close unclosed code block
  if (inCodeBlock) {
    html += '<pre><code>' + esc(codeContent.replace(/\n$/, '')) + '</code></pre>\n';
  }

  return html;
}

function inline(text) {
  let s = esc(text);
  // Inline code (must be before bold/italic)
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  // Links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function render() {
  preview.innerHTML = parseMarkdown(editor.value);
}

editor.addEventListener('input', render);
render();

copyHtmlBtn.addEventListener('click', () => {
  const html = parseMarkdown(editor.value);
  navigator.clipboard.writeText(html).then(() => {
    copyHtmlBtn.textContent = 'Copied!';
    copyHtmlBtn.classList.add('copied');
    setTimeout(() => { copyHtmlBtn.textContent = 'Copy HTML'; copyHtmlBtn.classList.remove('copied'); }, 1200);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = html; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    copyHtmlBtn.textContent = 'Copied!';
    copyHtmlBtn.classList.add('copied');
    setTimeout(() => { copyHtmlBtn.textContent = 'Copy HTML'; copyHtmlBtn.classList.remove('copied'); }, 1200);
  });
});
</script>
<script src="../../public/theme.js"></script>
</body>
</html>
