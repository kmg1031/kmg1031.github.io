<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할인율 계산기 | Handshake Tools</title>
<link rel="stylesheet" href="../../public/common.css" />
<style>
  .container { 
    width: 100%; 
    max-width: 560px; 
  }
  .input-group { 
    display: flex; 
    flex-direction: column;
    gap: 18px; 
    margin-bottom: 24px; 
  }
  .field { 
    display: flex; 
    flex-direction: column; 
    gap: 6px; 
  }
  .field label { 
    font-size: 0.9rem; 
    color: var(--text-muted); 
    font-weight: 600; 
  }
  .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { 
    border-color: var(--accent); 
  }
  .field input:read-only {
    background: var(--bg);
    color: var(--accent);
    font-weight: 600;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .result-row:last-child {
    border-bottom: none;
  }
  .result-label {
    color: var(--text-muted);
    font-weight: 500;
  }
  .result-value {
    font-size: 1.2rem;
    font-weight: 700;
  }
  .savings {
    color: var(--accent2);
  }
  .percentage {
    color: var(--accent);
  }
  .price {
    color: var(--text);
  }
  .savings-highlight {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 1.5rem;
    font-weight: 800;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-reset:hover {
    background: var(--surface2);
    color: var(--text);
  }
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    padding: 4px;
    background: var(--surface2);
    border-radius: 12px;
  }
  .mode-tab {
    flex: 1;
    padding: 10px 16px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .mode-tab.active {
    background: var(--accent);
    color: white;
  }
  .mode-tab:hover:not(.active) {
    background: var(--border);
    color: var(--text);
  }
  .helper-text {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-style: italic;
  }
</style>
</head>
<body class="page-wrap">
<a class="back" href="../../public/index.html">&larr; 돌아가기</a>
<h1 class="page-title">💰 할인율 계산기</h1>

<div class="container">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="discount">할인율 계산</button>
    <button class="mode-tab" data-mode="rate">할인율 구하기</button>
    <button class="mode-tab" data-mode="original">원가 구하기</button>
  </div>

  <div class="input-group">
    <div class="field">
      <label for="original">원가 (원)</label>
      <input type="number" id="original" placeholder="100,000" min="0" step="100">
      <div class="helper-text" id="originalHelper">원래 가격을 입력하세요</div>
    </div>
    
    <div class="field">
      <label for="discounted">할인가 (원)</label>
      <input type="number" id="discounted" placeholder="75,000" min="0" step="100">
      <div class="helper-text" id="discountedHelper">할인된 가격을 입력하세요</div>
    </div>
    
    <div class="field">
      <label for="rate">할인율 (%)</label>
      <input type="number" id="rate" placeholder="25" min="0" max="100" step="0.1">
      <div class="helper-text" id="rateHelper">할인율을 입력하세요</div>
    </div>
  </div>

  <div id="resultArea" class="result-card" style="display: none;">
    <div class="result-row">
      <span class="result-label">원가</span>
      <span class="result-value price" id="resultOriginal">₩0</span>
    </div>
    <div class="result-row">
      <span class="result-label">할인가</span>
      <span class="result-value price" id="resultDiscounted">₩0</span>
    </div>
    <div class="result-row">
      <span class="result-label">할인율</span>
      <span class="result-value percentage" id="resultRate">0%</span>
    </div>
    <div class="result-row">
      <span class="result-label">절약 금액</span>
      <span class="result-value savings-highlight" id="resultSavings">₩0</span>
    </div>
    
    <button class="btn-reset" onclick="resetAll()">초기화</button>
  </div>
</div>

<script>
let currentMode = 'discount'; // discount, rate, original

// 모드 탭 이벤트
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    // 탭 상태 업데이트
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    
    currentMode = tab.dataset.mode;
    updateModeUI();
    calculate();
  });
});

// 모드별 UI 업데이트
function updateModeUI() {
  const originalInput = document.getElementById('original');
  const discountedInput = document.getElementById('discounted');
  const rateInput = document.getElementById('rate');
  
  const originalHelper = document.getElementById('originalHelper');
  const discountedHelper = document.getElementById('discountedHelper');
  const rateHelper = document.getElementById('rateHelper');
  
  // 모든 readonly 해제
  originalInput.readOnly = false;
  discountedInput.readOnly = false;
  rateInput.readOnly = false;
  
  switch(currentMode) {
    case 'discount':
      // 원가 + 할인율 → 할인가 계산
      discountedInput.readOnly = true;
      originalHelper.textContent = '원래 가격을 입력하세요';
      discountedHelper.textContent = '자동으로 계산됩니다';
      rateHelper.textContent = '할인율을 입력하세요';
      break;
      
    case 'rate':
      // 원가 + 할인가 → 할인율 계산
      rateInput.readOnly = true;
      originalHelper.textContent = '원래 가격을 입력하세요';
      discountedHelper.textContent = '할인된 가격을 입력하세요';
      rateHelper.textContent = '자동으로 계산됩니다';
      break;
      
    case 'original':
      // 할인가 + 할인율 → 원가 계산
      originalInput.readOnly = true;
      originalHelper.textContent = '자동으로 계산됩니다';
      discountedHelper.textContent = '할인된 가격을 입력하세요';
      rateHelper.textContent = '할인율을 입력하세요';
      break;
  }
}

// 숫자 포맷팅 (천 단위 콤마)
function formatNumber(num) {
  if (isNaN(num) || num === null || num === undefined) return '0';
  return Math.round(num).toLocaleString('ko-KR');
}

// 계산 함수
function calculate() {
  try {
    const original = parseFloat(document.getElementById('original').value) || 0;
    const discounted = parseFloat(document.getElementById('discounted').value) || 0;
    const rate = parseFloat(document.getElementById('rate').value) || 0;
    
    let resultOriginal = original;
    let resultDiscounted = discounted;
    let resultRate = rate;
    
    switch(currentMode) {
      case 'discount':
        // 원가 + 할인율 → 할인가 계산
        if (original > 0 && rate >= 0 && rate <= 100) {
          resultDiscounted = original * (1 - rate / 100);
          document.getElementById('discounted').value = Math.round(resultDiscounted);
        }
        break;
        
      case 'rate':
        // 원가 + 할인가 → 할인율 계산
        if (original > 0 && discounted >= 0 && discounted <= original) {
          resultRate = ((original - discounted) / original) * 100;
          document.getElementById('rate').value = Math.round(resultRate * 10) / 10;
        }
        break;
        
      case 'original':
        // 할인가 + 할인율 → 원가 계산
        if (discounted > 0 && rate >= 0 && rate < 100) {
          resultOriginal = discounted / (1 - rate / 100);
          document.getElementById('original').value = Math.round(resultOriginal);
        }
        break;
    }
    
    // 결과 업데이트
    updateResults(resultOriginal, resultDiscounted, resultRate);
    
  } catch (error) {
    console.error('계산 오류:', error);
  }
}

// 결과 업데이트
function updateResults(original, discounted, rate) {
  const savings = original - discounted;
  
  // 유효한 값들이 있을 때만 결과 표시
  if (original > 0 && discounted >= 0 && rate >= 0 && savings >= 0) {
    document.getElementById('resultOriginal').textContent = `₩${formatNumber(original)}`;
    document.getElementById('resultDiscounted').textContent = `₩${formatNumber(discounted)}`;
    document.getElementById('resultRate').textContent = `${Math.round(rate * 10) / 10}%`;
    document.getElementById('resultSavings').textContent = `₩${formatNumber(savings)}`;
    
    document.getElementById('resultArea').style.display = 'block';
  } else {
    document.getElementById('resultArea').style.display = 'none';
  }
}

// 초기화
function resetAll() {
  document.getElementById('original').value = '';
  document.getElementById('discounted').value = '';
  document.getElementById('rate').value = '';
  document.getElementById('resultArea').style.display = 'none';
}

// 입력 이벤트 리스너
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', calculate);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      calculate();
    }
  });
});

// 초기 모드 설정
updateModeUI();
</script>
<script src="../../public/theme.js"></script>
</body>
</html>
