<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 – Handshake Games</title>
  <link rel="stylesheet" href="style.css" />
  <script src="../../public/nav.js"></script>
</head>
<body>

  <div class="game-header">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-new">New Game</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>

    <div class="overlay" id="overlay">
      <h2 id="overlay-title"></h2>
      <p id="overlay-msg"></p>
      <button class="btn" id="overlay-continue" style="display:none">계속 플레이</button>
      <button class="btn" id="overlay-retry">다시 시작</button>
    </div>
  </div>

  <p class="hint">방향키 / WASD / 스와이프로 타일 이동</p>

  <script src="game.js"></script>
</body>
</html>
