<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction – Handshake Games</title>
  <link rel="stylesheet" href="style.css" />
  <script src="../../public/nav.js"></script>
</head>
<body>
  <h1>Reaction</h1>

  <!-- 게임 아레나 -->
  <div class="arena-wrap">
    <div class="arena" id="arena">
      <div class="arena-icon" id="arena-icon">⚡</div>
      <div class="arena-title" id="arena-title">클릭해서 시작</div>
      <div class="arena-sub"   id="arena-sub">화면이 바뀌면 최대한 빨리 클릭하세요 · 5라운드</div>
    </div>
  </div>

  <!-- 라운드 진행 점 -->
  <div class="round-dots" id="round-dots"></div>

  <!-- 최종 요약 (5라운드 후) -->
  <div class="summary" id="summary" style="display:none">
    <h3>라운드별 기록</h3>
    <div class="round-list" id="round-list"></div>
    <button class="btn" onclick="init()">다시 하기</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
