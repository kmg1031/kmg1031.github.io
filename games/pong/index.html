<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong – Handshake Games</title>
  <link rel="stylesheet" href="../../public/common.css" />
  <style>
    canvas { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .game-container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .hud { display: flex; gap: 48px; font-size: 1.3rem; font-weight: 700; }
    .hud .player { color: var(--accent); }
    .hud .ai { color: var(--accent2); }
    .hud span { color: var(--text-muted); font-size: 0.9rem; font-weight: 400; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,17,23,0.88); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius); gap: 16px; }
    .overlay h2 { font-size: 2rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .overlay p { color: var(--text-muted); font-size: 1.1rem; }
    .canvas-wrap { position: relative; }
    .hint { color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 8px; }
    .paused-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: var(--accent); font-weight: 700; pointer-events: none; }
  </style>
</head>
<body class="page-wrap">
  <a class="back" href="../../public/index.html">&larr; 돌아가기</a>
  <h1 class="page-title">Pong</h1>

  <div class="game-container">
    <div class="hud">
      <div><span>Player </span><span class="player" id="p-score">0</span></div>
      <div><span>AI </span><span class="ai" id="a-score">0</span></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="c" width="600" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ol-title">Pong</h2>
        <p id="ol-msg">First to 11 wins. Click or Enter to start.</p>
        <button class="btn btn-primary" id="ol-btn">Start</button>
      </div>
      <div class="paused-text" id="pause-text" style="display:none;">PAUSED</div>
    </div>
    <p class="hint">W/S or Mouse to move &nbsp;|&nbsp; Space to pause</p>
  </div>

  <script>
  (function() {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pScoreEl = document.getElementById('p-score');
    const aScoreEl = document.getElementById('a-score');
    const overlay = document.getElementById('overlay');
    const olTitle = document.getElementById('ol-title');
    const olMsg = document.getElementById('ol-msg');
    const olBtn = document.getElementById('ol-btn');
    const pauseText = document.getElementById('pause-text');

    const WIN_SCORE = 11;
    const PADDLE_W = 10, PADDLE_H = 70, BALL_R = 6;
    const PADDLE_SPEED = 5;

    let pScore = 0, aScore = 0;
    let running = false, paused = false;
    let ball, player, ai, baseSpeed, speedMult;
    let mouseY = H / 2;

    function resetBall(dir) {
      baseSpeed = 4;
      speedMult = 1;
      let angle = (Math.random() * 0.8 - 0.4);
      ball = { x: W / 2, y: H / 2, dx: baseSpeed * dir * Math.cos(angle), dy: baseSpeed * Math.sin(angle), r: BALL_R };
    }

    function init() {
      pScore = 0; aScore = 0;
      player = { x: 15, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
      ai = { x: W - 15 - PADDLE_W, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
      resetBall(1);
      updateHUD();
    }

    function updateHUD() {
      pScoreEl.textContent = pScore;
      aScoreEl.textContent = aScore;
    }

    function showOverlay(title, msg, btn) {
      olTitle.textContent = title;
      olMsg.textContent = msg;
      olBtn.textContent = btn;
      overlay.style.display = 'flex';
    }

    let keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ' && running) {
        e.preventDefault();
        paused = !paused;
        pauseText.style.display = paused ? 'block' : 'none';
      }
      if (e.key === 'Enter' && !running && overlay.style.display === 'flex') {
        startFromOverlay();
      }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseY = (e.clientY - rect.top) * (H / rect.height);
    });

    function update() {
      if (paused) return;

      // Player movement
      if (keys['w'] || keys['W'] || keys['ArrowUp']) player.y -= PADDLE_SPEED;
      if (keys['s'] || keys['S'] || keys['ArrowDown']) player.y += PADDLE_SPEED;
      // Mouse
      let target = mouseY - player.h / 2;
      let diff = target - player.y;
      if (Math.abs(diff) > 2) player.y += diff * 0.15;
      player.y = Math.max(0, Math.min(H - player.h, player.y));

      // AI
      let aiTarget = ball.y - ai.h / 2;
      let aiDiff = aiTarget - ai.y;
      let aiSpeed = 3.5 + pScore * 0.15;
      ai.y += Math.sign(aiDiff) * Math.min(Math.abs(aiDiff), aiSpeed);
      ai.y = Math.max(0, Math.min(H - ai.h, ai.y));

      // Ball
      speedMult += 0.0001;
      ball.x += ball.dx * speedMult;
      ball.y += ball.dy * speedMult;

      // Top/bottom walls
      if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }
      if (ball.y + ball.r >= H) { ball.y = H - ball.r; ball.dy = -Math.abs(ball.dy); }

      // Paddle collisions
      function paddleCollide(p, isPlayer) {
        if (ball.x - ball.r <= p.x + p.w && ball.x + ball.r >= p.x &&
            ball.y >= p.y && ball.y <= p.y + p.h) {
          let rel = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
          let angle = rel * Math.PI / 3;
          let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) + 0.3;
          let dir = isPlayer ? 1 : -1;
          ball.dx = dir * speed * Math.cos(angle);
          ball.dy = speed * Math.sin(angle);
          ball.x = isPlayer ? p.x + p.w + ball.r : p.x - ball.r;
        }
      }
      paddleCollide(player, true);
      paddleCollide(ai, false);

      // Scoring
      if (ball.x < -ball.r) {
        aScore++;
        updateHUD();
        if (aScore >= WIN_SCORE) { running = false; showOverlay('AI Wins!', `${pScore} - ${aScore}`, 'Rematch'); return; }
        resetBall(1);
      }
      if (ball.x > W + ball.r) {
        pScore++;
        updateHUD();
        if (pScore >= WIN_SCORE) { running = false; showOverlay('You Win!', `${pScore} - ${aScore}`, 'Rematch'); return; }
        resetBall(-1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Center line
      ctx.setLineDash([6, 8]);
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#2e3350';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6c63ff';
      ctx.beginPath();
      ctx.roundRect(player.x, player.y, player.w, player.h, 4);
      ctx.fill();

      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim() || '#ff6584';
      ctx.beginPath();
      ctx.roundRect(ai.x, ai.y, ai.w, ai.h, 4);
      ctx.fill();

      // Ball
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function startFromOverlay() {
      if (olBtn.textContent === 'Rematch' || olBtn.textContent === 'Start') init();
      overlay.style.display = 'none';
      paused = false;
      pauseText.style.display = 'none';
      running = true;
      loop();
    }

    olBtn.addEventListener('click', startFromOverlay);
    canvas.addEventListener('click', () => {
      if (!running && overlay.style.display === 'flex') startFromOverlay();
    });

    init();
  })();
  </script>
  <script src="../../public/theme.js"></script>
</body>
</html>
